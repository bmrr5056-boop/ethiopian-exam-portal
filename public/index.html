<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian Exam Portal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .btn-subject { background-color: #3498db; color: white; border: none; padding: 12px 20px; margin: 10px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 80%; }
        .btn-subject:hover { background-color: #2980b9; }
        .option-btn { display: block; width: 100%; background: #ecf0f1; border: 1px solid #bdc3c7; padding: 12px; margin: 8px 0; border-radius: 5px; cursor: pointer; font-size: 15px; text-align: left; }
        .option-btn:hover { background: #d5dbdb; }
        .next-btn { background-color: #2ecc71; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>የ12ኛ ክፍል ማትሪክ መለማመጃ ፖርታል</h1>
    
    <div id="subject-selection">
        <h3>ትምህርት ይምረጡ፡</h3>
        <button class="btn-subject" onclick="startQuiz('english')">English</button>
        <button class="btn-subject" onclick="startQuiz('physics')">Physics</button>
        <button class="btn-subject" onclick="startQuiz('geography')">Geography</button>
    </div>

    <div id="quiz-container" style="display: none;">
        <div id="question-box"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">ቀጣይ ጥያቄ ➡️</button>
    </div>
</div>

<script>
let currentQuestions = [];
let currentIndex = 0;

async function startQuiz(subject) {
    try {
        const response = await fetch(`/api/quiz/${subject}`);
        const data = await response.json();
        
        if (!response.ok) {
            alert(data.message || "ስህተት ተፈጥሯል");
            return;
        }

        currentQuestions = data;
        currentIndex = 0;
        
        document.getElementById('subject-selection').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        displayQuestion();
    } catch (error) {
        console.error("ጥያቄዎችን መጫን አልተቻለም:", error);
        alert("ሰርቨሩ ላይ ችግር አለ፣ እባክህ ትንሽ ቆይተህ ሞክር!");
    }
}

function displayQuestion() {
    if (currentQuestions.length === 0) return;

    const questionBox = document.getElementById('question-box');
    const currentQ = currentQuestions[currentIndex];
    document.getElementById('next-btn').style.display = 'none';

    questionBox.innerHTML = `
        <h3 style="text-align: left; color: #34495e;">ጥያቄ ${currentIndex + 1}: ${currentQ.question}</h3>
        ${currentQ.options.map(opt => `
            <button class="option-btn" onclick="checkAnswer(this, '${opt}', '${currentQ.answer}')">${opt}</button>
        `).join('')}
    `;
}

function checkAnswer(button, selected, correct) {
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true); // ሌላ እንዳይመርጥ ማገድ

    if (selected === correct) {
        button.style.backgroundColor = '#2ecc71';
        button.style.color = 'white';
    } else {
        button.style.backgroundColor = '#e74c3c';
        button.style.color = 'white';
        // ትክክለኛውን መልስ በባረንጓዴ ማሳየት
        buttons.forEach(btn => {
            if (btn.innerText === correct) {
                btn.style.backgroundColor = '#2ecc71';
                btn.style.color = 'white';
            }
        });
    }
    document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        displayQuestion();
    } else {
        alert("የዚህን ዙር ጥያቄዎች ጨርሰሃል! ወደ ዋናው ገጽ ይመለሳል።");
        document.getElementById('subject-selection').style.display = 'block';
        document.getElementById('quiz-container').style.display = 'none';
    }
}
</script>

</body>
</html>
