<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian Exam Portal</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; margin: 15px 0; font-size: 16px; border-radius: 5px; }
        .btn { background-color: #2ecc71; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; }
        .option-btn { display: block; width: 100%; background: #ecf0f1; border: 1px solid #bdc3c7; padding: 12px; margin: 8px 0; border-radius: 5px; cursor: pointer; font-size: 15px; text-align: left; }
        .next-btn { background-color: #3498db; color: white; border: none; padding: 12px 25px; font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>እንኳን ደህና መጡ ወደ ፈተና መለማመጃው!</h2>
    
    <div id="selection-box">
        <h3>የፈተና ትምህርት ይምረጡ፡</h3>
        <select id="subject-dropdown">
            <option value="ENGLISH">ENGLISH</option>
            <option value="MATHEMATICS">MATHEMATICS</option>
            <option value="GEOGRAPHY">GEOGRAPHY</option>
            <option value="PHYSICS">PHYSICS</option>
            <option value="HISTORY">HISTORY</option>
            <option value="CIVICS">CIVICS</option>
            <option value="ECONOMICS">ECONOMICS</option>
            <option value="APTITUDE (SAT)">APTITUDE (SAT)</option>
        </select>
        <button class="btn" onclick="fetchQuiz()">ፈተናውን ጀምር 🚀</button>
    </div>

    <div id="quiz-container" style="display: none;">
        <div id="question-box"></div>
        <button id="next-btn" class="next-btn" onclick="nextQuestion()">ቀጣይ ጥያቄ ➡️</button>
    </div>
</div>

<script>
let currentQuestions = [];
let currentIndex = 0;

async function fetchQuiz() {
    const selectedSubject = document.getElementById('subject-dropdown').value;
    
    try {
        // ከ questions.json ፋይል ይልቅ በቀጥታ ወደ ሰርቨሩ API ጥያቄ ይልካል
        const response = await fetch(`/api/quiz/${selectedSubject}`);
        const data = await response.json();
        
        if (!response.ok) {
            alert(data.message || "ስህተት ተፈጥሯል");
            return;
        }

        currentQuestions = data;
        currentIndex = 0;
        
        document.getElementById('selection-box').style.display = 'none';
        document.getElementById('quiz-container').style.display = 'block';
        
        displayQuestion();
    } catch (error) {
        console.error("Error:", error);
        alert("ከሰርቨሩ ጋር መገናኘት አልተቻለም! እባክህ ሰርቨሩ በትክክል መስራቱን አረጋግጥ።");
    }
}

function displayQuestion() {
    if (currentQuestions.length === 0) return;

    const questionBox = document.getElementById('question-box');
    const currentQ = currentQuestions[currentIndex];
    document.getElementById('next-btn').style.display = 'none';

    questionBox.innerHTML = `
        <h3 style="text-align: left;">ጥያቄ ${currentIndex + 1}: ${currentQ.question}</h3>
        ${currentQ.options.map(opt => `
            <button class="option-btn" onclick="checkAnswer(this, '${opt.replace(/'/g, "\\'")}', '${currentQ.answer.replace(/'/g, "\\'")}')">${opt}</button>
        `).join('')}
    `;
}

function checkAnswer(button, selected, correct) {
    const buttons = document.querySelectorAll('.option-btn');
    buttons.forEach(btn => btn.disabled = true);

    if (selected === correct) {
        button.style.backgroundColor = '#2ecc71';
        button.style.color = 'white';
    } else {
        button.style.backgroundColor = '#e74c3c';
        button.style.color = 'white';
        buttons.forEach(btn => {
            if (btn.innerText === correct) {
                btn.style.backgroundColor = '#2ecc71';
                btn.style.color = 'white';
            }
        });
    }
    document.getElementById('next-btn').style.display = 'inline-block';
}

function nextQuestion() {
    if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        displayQuestion();
    } else {
        alert("ሁሉንም ጥያቄዎች ጨርሰሃል! ወደ ዋናው ገጽ ይመለሳል።");
        document.getElementById('selection-box').style.display = 'block';
        document.getElementById('quiz-container').style.display = 'none';
    }
}
</script>

</body>
</html>
