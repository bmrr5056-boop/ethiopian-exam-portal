<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethiopian 12th Grade Exam Portal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: #121214; color: #e1e1e6; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; position: relative; padding-bottom: 60px; }
        .container { width: 100%; max-width: 650px; background: #202024; padding: 30px; border-radius: 8px; border: 1px solid #323238; }
        h1, h2 { color: #04d361; text-align: center; margin-bottom: 20px; }
        .hidden { display: none !important; }
        .btn { display: block; width: 100%; background: #04d361; color: #000; padding: 12px; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; text-align: center; transition: background 0.2s; }
        .btn:hover { background: #00b34d; }
        .btn-outline { background: transparent; color: #04d361; border: 2px solid #04d361; }
        .btn-outline:hover { background: rgba(4, 211, 97, 0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #a8a8b3; }
        input, select { width: 100%; padding: 12px; background: #121214; border: 1px solid #323238; border-radius: 4px; color: #fff; font-size: 16px; }
        .option-container { margin: 10px 0; padding: 12px; background: #29292e; border: 1px solid #323238; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
        .option-container:hover { background: #323238; }
        .option-container.selected { border-color: #04d361; background: #1c2e24; }
        .progress-bar { width: 100%; background: #323238; height: 8px; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { background: #04d361; height: 100%; width: 0%; transition: width 0.3s; }
        .review-item { background: #29292e; border-left: 4px solid #7c7c8a; padding: 15px; margin-bottom: 15px; border-radius: 0 4px 4px 0; }
        .review-item.correct { border-left-color: #04d361; }
        .review-item.incorrect { border-left-color: #f75a68; }
        .txt-correct { color: #04d361; font-weight: bold; }
        .txt-incorrect { color: #f75a68; font-weight: bold; }
        .score-display { text-align: center; font-size: 24px; margin: 20px 0; color: #fff; }
        
        .footer-owner { position: fixed; bottom: 15px; left: 0; width: 100%; text-align: center; color: #7c7c8a; font-size: 13px; font-weight: 500; letter-spacing: 0.5px; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-section">
        <h1>የ12ኛ ክፍል ብሔራዊ ፈተና መለማመጃ ፖርታል</h1>
        <div class="form-group">
            <label for="username">ሙሉ ስም</label>
            <input type="text" id="username" placeholder="ስምዎን እዚህ ያስገቡ...">
        </div>
        <button class="btn" onclick="handleLogin()">ግባ (Login)</button>
    </div>

    <div id="stream-section" class="hidden">
        <h2 id="welcome-msg">እንኳን ደህና መጡ!</h2>
        <div class="form-group">
            <label for="stream-select">ዘርፍ (Stream) ይምረጡ</label>
            <select id="stream-select" onchange="updateSubjects()">
                <option value="">-- ይምረጡ --</option>
                <option value="natural">Natural Science (የተፈጥሮ ሳይንስ)</option>
                <option value="social">Social Science (የማኅበራዊ ሳይንስ)</option>
            </select>
        </div>
        <div class="form-group">
            <label for="subject-select">የፈተና ትምህርት ይምረጡ</label>
            <select id="subject-select" disabled>
                <option value="">-- መጀመሪያ ዘርፍ ይምረጡ --</option>
            </select>
        </div>
        <button class="btn" id="start-btn" onclick="startExam()" disabled>ፈተናውን ጀምር</button>
    </div>

    <div id="exam-section" class="hidden">
        <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
        <div style="display: flex; justify-content: space-between; margin-bottom: 15px; color: #a8a8b3;">
            <span id="question-counter">ጥያቄ፡ 1/100</span>
            <span id="subject-title">ትምህርት</span>
        </div>
        <div id="question-text" style="font-size: 18px; margin-bottom: 20px; line-height: 1.5;">የጥያቄው ጽሑፍ እዚህ ይጫናል...</div>
        <div id="options-block"></div>
        <button class="btn" id="next-btn" onclick="goToNextQuestion()" disabled>ቀጣይ ጥያቄ ➡️</button>
    </div>

    <div id="result-section" class="hidden">
        <h2>የፈተናው ውጤት ማጠቃለያ</h2>
        <div class="score-display" id="score-text">ውጤት፡ 0 / 0 (0%)</div>
        
        <h3 style="margin: 20px 0 10px 0; color: #04d361;">የመልሶች ማረጋገጫ (Review)</h3>
        <div id="review-block" style="max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>

        <button class="btn btn-outline" onclick="backToStreamSelection()">ወደ ዋናው ገጽ ተመለስ (Subjects)</button>
    </div>
</div>

<div class="footer-owner">Owner: Amanuel Zewude</div>

<script>
    let allQuestions = [];
    let currentSubjectQuestions = [];
    let currentIndex = 0;
    let userAnswers = [];
    let score = 0;
    let studentName = "";

    async function loadQuestions() {
        try {
            const res = await fetch('/questions');
            allQuestions = await res.json();
            console.log("Loaded questions:", allQuestions.length);
        } catch (err) {
            console.error("የጥያቄ ፋይሉን ማንበብ አልተቻለም:", err);
        }
    }
    loadQuestions();

    function handleLogin() {
        const nameInput = document.getElementById('username').value.trim();
        if(!nameInput) return alert("እባክህ መጀመሪያ ስምህን አስገባ!");
        studentName = nameInput;
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('stream-section').classList.remove('hidden');
        document.getElementById('welcome-msg').innerText = `እንኳን ደህና መጡ፣ ${studentName}!`;
    }

    function updateSubjects() {
        const stream = document.getElementById('stream-select').value;
        const subSelect = document.getElementById('subject-select');
        const startBtn = document.getElementById('start-btn');
        
        subSelect.innerHTML = '<option value="">-- ይምረጡ --</option>';
        if(!stream) {
            subSelect.disabled = true;
            startBtn.disabled = true;
            return;
        }

        // 100% አስተማማኝ ማጣሪያ (ፊደል ትልቅም ትንሽም ቢሆን ይፈልገዋል)
        let filtered = allQuestions.filter(q => q.stream && q.stream.toLowerCase().includes(stream.toLowerCase()));
        
        // አሁንም ካልተገኘ በ questions.json ውስጥ ያለውን ሁሉንም ልዩ ትምህርቶች በሙሉ ያውጣው
        if(filtered.length === 0) {
            filtered = allQuestions;
        }

        const subjects = [...new Set(filtered.map(q => q.subject))];
        
        subjects.forEach(sub => {
            if(sub) {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.innerText = sub.toUpperCase();
                subSelect.appendChild(opt);
            }
        });

        subSelect.disabled = false;
        startBtn.disabled = false;
    }

    function startExam() {
        const subject = document.getElementById('subject-select').value;
        if(!subject) return alert("እባክህ ትምህርት ምረጥ!");

        // በስም ብቻ ጥያቄዎችን በትክክል መርጦ ያውጣ
        currentSubjectQuestions = allQuestions.filter(q => q.subject === subject);
        
        if(currentSubjectQuestions.length === 0) return alert("ለዚህ ክፍለ ትምህርት የተዘጋጀ ጥያቄ አልተገኘም!");

        currentIndex = 0;
        score = 0;
        userAnswers = [];

        document.getElementById('subject-title').innerText = subject.toUpperCase();
        document.getElementById('stream-section').classList.add('hidden');
        document.getElementById('exam-section').classList.remove('hidden');
        
        showQuestion();
    }

    function showQuestion() {
        const q = currentSubjectQuestions[currentIndex];
        document.getElementById('question-counter').innerText = `ጥያቄ፡ ${currentIndex + 1}/${currentSubjectQuestions.length}`;
        document.getElementById('question-text').innerText = q.question;
        
        const fillPercent = ((currentIndex) / currentSubjectQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = `${fillPercent}%`;

        const optionsBlock = document.getElementById('options-block');
        optionsBlock.innerHTML = "";
        document.getElementById('next-btn').disabled = true;

        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = "option-container";
            div.innerText = opt;
            div.onclick = () => selectOption(div, idx);
            optionsBlock.appendChild(div);
        });
    }

    function selectOption(element, optionIndex) {
        const containers = document.querySelectorAll('.option-container');
        containers.forEach(c => c.classList.remove('selected'));
        
        element.classList.add('selected');
        userAnswers[currentIndex] = optionIndex;
        
        document.getElementById('next-btn').disabled = false;
    }

    function goToNextQuestion() {
        currentIndex++;
        if(currentIndex < currentSubjectQuestions.length) {
            showQuestion();
        } else {
            calculateAndShowResults();
        }
    }

    function calculateAndShowResults() {
        document.getElementById('exam-section').classList.add('hidden');
        document.getElementById('result-section').classList.remove('hidden');

        score = 0;
        const reviewBlock = document.getElementById('review-block');
        reviewBlock.innerHTML = "";

        currentSubjectQuestions.forEach((q, idx) => {
            const userChoice = userAnswers[idx];
            const isCorrect = (userChoice === q.correctAnswer);
            if(isCorrect) score++;

            const item = document.createElement('div');
            item.className = `review-item ${isCorrect ? 'correct' : 'incorrect'}`;
            
            item.innerHTML = `
                <p style="font-weight:bold; margin-bottom:5px;">ጥያቄ ${idx + 1}: ${q.question}</p>
                <p>ያንተ መልስ: <span class="${isCorrect ? 'txt-correct' : 'txt-incorrect'}">${q.options[userChoice] || 'ያልተመለሰ'}</span></p>
                ${!isCorrect ? `<p>ትክክለኛ መልስ: <span class="txt-correct">${q.options[q.correctAnswer]}</span></p>` : ''}
            `;
            reviewBlock.appendChild(item);
        });

        const percent = Math.round((score / currentSubjectQuestions.length) * 100);
        document.getElementById('score-text').innerText = `ውጤት፡ ${score} / ${currentSubjectQuestions.length} (${percent}%)`;
    }

    function backToStreamSelection() {
        document.getElementById('result-section').classList.add('hidden');
        document.getElementById('stream-section').classList.remove('hidden');
        
        document.getElementById('stream-select').value = "";
        document.getElementById('subject-select').innerHTML = '<option value="">-- መጀመሪያ ዘርፍ ይምረጡ --</option>';
        document.getElementById('subject-select').disabled = true;
        document.getElementById('start-btn').disabled = true;
    }
</script>

</body>
</html>
